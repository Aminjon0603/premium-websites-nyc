  <rect x="420" y="463" width="210" height="48" rx="24" fill="#161C26" stroke="#9FE3CB" stroke-opacity=".16" />
  <text x="525" y="494" fill="#F4EFE7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">3–5 day turnaround</text>
