  <g filter="url(#shadow)">
    <rect width="1080" height="510" x="60" y="60" fill="url(#panel)" rx="34" />
    <rect width="1080" height="510" x="60" y="60" fill="url(#accent)" fill-opacity=".3" rx="34" />
    <rect width="1080" height="510" x="60" y="60" stroke="#F4EFE7" stroke-opacity=".08" rx="34" />
  </g>

  <rect x="108" y="112" width="82" height="82" rx="24" fill="#0D1219" stroke="#D7AF72" stroke-opacity=".4" />
